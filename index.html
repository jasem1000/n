<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تفعيل النظام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        /* خلفية الشاشة بالكامل */
        body, html {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية التفعيل (الكرت الأبيض) */
        .activation-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-top: 5px solid var(--danger);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* صندوق رقم الجهاز */
        .hwid-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #1f2937;
            margin-bottom: 25px;
            user-select: all;
            border: 2px dashed #cbd5e1;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .hwid-box:hover {
            border-color: var(--primary);
            background: #e2e8f0;
        }

        /* حقل إدخال مفتاح التفعيل */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            outline: none;
            text-align: center;
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        /* زر التفعيل */
        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-main:hover {
            background: #059669; /* لون أغمق عند المرور */
            transform: translateY(-2px);
        }
        
        .btn-main:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="activation-card">
        <i class="fa-solid fa-lock" style="font-size: 60px; color: var(--danger); margin-bottom: 15px;"></i>
        
        <h2 style="color: var(--danger); margin-bottom: 10px;">البرنامج غير مفعل!</h2>
        <p style="font-weight: bold; margin-bottom: 20px; color: #64748b;">
            أرسل رقم جهازك للمبرمج للحصول على مفتاح التفعيل:
        </p>
        
        <div class="hwid-box" id="displayHwid" title="انقر لنسخ الرقم" onclick="copyHwid()">
            A1B2-C3D4-E5F6
        </div>
        
        <div class="input-group">
            <input type="text" id="activationKeyInput" placeholder="أدخل مفتاح التفعيل هنا (مثال: LIFE-XXXX-XXXX)" autocomplete="off">
        </div>
        
        <button class="btn-main" onclick="verifyActivationKey()">
            <i class="fa-solid fa-key"></i> تفعيل البرنامج الآن
        </button>
    </div>

    <script>
        // دالة لنسخ رقم الجهاز عند النقر عليه
        function copyHwid() {
            const hwidText = document.getElementById('displayHwid').innerText;
            navigator.clipboard.writeText(hwidText).then(() => {
                alert("تم نسخ رقم الجهاز: " + hwidText);
            }).catch(err => {
                console.error('فشل في نسخ النص: ', err);
            });
        }

        // دالة فحص زر التفعيل
        function verifyActivationKey() {
            const keyInput = document.getElementById('activationKeyInput');
            const key = keyInput.value.trim();

            if (!key) {
                alert("الرجاء إدخال مفتاح التفعيل أولاً!");
                keyInput.focus();
                return;
            }

            // هنا تضع الكود الخاص بالتحقق من المفتاح (مثل الاتصال بالبايثون pywebview.api)
            // كمثال وهمي للتجربة:
            if (key.length >= 10) {
                alert("جاري التحقق من المفتاح وتفعيل البرنامج...");
                // location.reload();
            } else {
                alert("مفتاح التفعيل غير صحيح أو قصير جداً!");
                keyInput.value = '';
                keyInput.focus();
            }
        }

        // تفعيل الزر عند الضغط على مفتاح Enter
        document.getElementById('activationKeyInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifyActivationKey();
            }
        });
    </script>
</body>
</html>
